# Default values for sedaro-nano chart.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  backendRepository: ""
  frontendRepository: ""
  pullPolicy: Always
  # Overrides the image tag whose default is the chart appVersion.
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  backend:
    type: ClusterIP
    port: 8000
  frontend:
    type: ClusterIP
    port: 80

ingress:
  enabled: true
  className: "alb"
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    # alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS":443}]'
    # alb.ingress.kubernetes.io/actions.ssl-redirect: '{"Type": "redirect", "RedirectConfig": { "Protocol": "HTTPS", "Port": "443", "StatusCode": "HTTP_301"}}'
    # alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:region:account-id:certificate/certificate-id # Replace with your ACM ARN
  hosts:
    - paths:
        - path: /api/
          pathType: Prefix
          backend:
            service:
              name: backend # This will be templated to {{ .Release.Name }}-backend
              port:
                number: 8000
        - path: /
          pathType: Prefix
          backend:
            service:
              name: frontend # This will be templated to {{ .Release.Name }}-frontend
              port:
                number: 80
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

resources:
  backend:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"
  frontend:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "128Mi"

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

# Multi-architecture deployment configuration
multiArch:
  # Enable multi-architecture support
  enabled: true
  
  # Node affinity settings for different architectures
  nodeAffinity:
    # Prefer ARM64 nodes for cost optimization (Graviton instances)
    preferArm64: true
    
    # Allow fallback to AMD64 if ARM64 nodes are not available
    allowFallback: true
    
    # Specific node selector for ARM64 workloads (optional)
    arm64NodeSelector: {}
    #   sedaro.io/architecture: arm64
    
    # Specific node selector for AMD64 workloads (optional)  
    amd64NodeSelector: {}
    #   sedaro.io/architecture: amd64

# Backend configuration
backend:
  # Node affinity and tolerations
  nodeAffinity: {}
  tolerations: []
  
  # Resource configuration optimized for both architectures
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi

# Frontend configuration  
frontend:
  # Node affinity and tolerations
  nodeAffinity: {}
  tolerations: []
  
  # Resource configuration
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 64Mi
