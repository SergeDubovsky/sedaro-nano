{{- if .Values.ingress.enabled -}}
{{- $domainEnabled := .Values.domain.enabled -}}
{{- $fullDomain := .Values.domain.fullName -}}
{{- $tlsEnabled := .Values.tls.enabled -}}
{{- $useACM := .Values.tls.certificate.useACM -}}
{{- $certArn := .Values.tls.certificate.arn -}}
{{- $sslRedirect := .Values.tls.redirect.enabled -}}
{{- $redirectStatus := .Values.tls.redirect.statusCode -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "sedaro-nano.fullname" . }}
  labels:
    {{- include "sedaro-nano.labels" . | nindent 4 }}
  annotations:
    {{- toYaml .Values.ingress.annotations | nindent 4 }}
    {{- if and $domainEnabled $tlsEnabled }}
    {{- if $useACM }}
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    {{- if $certArn }}
    alb.ingress.kubernetes.io/certificate-arn: {{ $certArn }}
    {{- end }}
    {{- if $sslRedirect }}
    alb.ingress.kubernetes.io/actions.ssl-redirect: '{"Type": "redirect", "RedirectConfig": { "Protocol": "HTTPS", "Port": "443", "StatusCode": "{{ $redirectStatus }}"}}'
    {{- end }}
    {{- end }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if and $domainEnabled $tlsEnabled $sslRedirect }}
  rules:
    # HTTP to HTTPS redirect rule
    - {{- if $fullDomain }}
      host: {{ $fullDomain | quote }}
      {{- end }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ssl-redirect
                port:
                  name: use-annotation
    # Main HTTPS rules
    {{- range .Values.ingress.hosts }}
    - {{- if and $domainEnabled $fullDomain }}
      host: {{ $fullDomain | quote }}
      {{- else if .host }}
      host: {{ .host | quote }}
      {{- end }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ include "sedaro-nano.fullname" $ }}-{{ .backend.service.name }}
                port:
                  number: {{ .backend.service.port.number }}
          {{- end }}
    {{- end }}
  {{- else }}
  rules:
    {{- range .Values.ingress.hosts }}
    - {{- if and $domainEnabled $fullDomain }}
      host: {{ $fullDomain | quote }}
      {{- else if .host }}
      host: {{ .host | quote }}
      {{- end }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ include "sedaro-nano.fullname" $ }}-{{ .backend.service.name }}
                port:
                  number: {{ .backend.service.port.number }}
          {{- end }}
    {{- end }}
  {{- end }}
  {{- if and $domainEnabled $tlsEnabled }}
  tls:
    - hosts:
        - {{ $fullDomain | quote }}
      {{- if not $useACM }}
      secretName: {{ include "sedaro-nano.fullname" . }}-tls
      {{- end }}
  {{- else if .Values.ingress.tls }}
  tls:
    {{- range .Values.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
{{- end }}
