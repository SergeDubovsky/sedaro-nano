# CodeQL configuration file
# This file configures CodeQL analysis to exclude Terraform and infrastructure files

name: "Sedaro Nano CodeQL Config"

# Disable the default setup to use custom configuration
disable-default-path-filters: true

# Define paths to include and exclude
paths:
  # Include source code directories
  - app
  - web
  - queries
  
paths-ignore:
  # Exclude infrastructure and configuration files
  - terraform
  - k8s
  - "**/*.md"
  - "**/*.txt" 
  - "**/*.json"
  - "**/*.yml"
  - "**/*.yaml"
  - "docker-compose.yml"
  - "Dockerfile*"
  - ".github/workflows"
  
# Language-specific configuration
languages:
  - python
  - typescript  
  - rust

# Query suite configuration
queries:
  - uses: security-extended
