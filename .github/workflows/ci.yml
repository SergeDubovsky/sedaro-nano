name: CI - Build and Push Docker Images

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'terraform-legacy-archive/**'
      - 'environments/**'
      - 'modules/**'
      - 'k8s/**'
      - '**/*.md'
      - '.github/workflows/terraform-infra-two-stage.yml'
      - '.github/workflows/destroy-infra-two-stage.yml'
      - '.github/workflows/deploy-k8s.yml'

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Convert repository owner to lowercase
        id: lowercase
        run: echo "repository_owner=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Generate version number
        id: version
        run: |
          # Get the current run number and use it as patch version
          VERSION="0.0.${{ github.run_number }}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Generated version: $VERSION"

      - name: Build and push backend (app) image
        id: build_app
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./app/Dockerfile
          push: true
          load: true
          tags: |
            ghcr.io/${{ steps.lowercase.outputs.repository_owner }}/sedaro-nano-app:latest
            ghcr.io/${{ steps.lowercase.outputs.repository_owner }}/sedaro-nano-app:${{ steps.version.outputs.version }}
            ghcr.io/${{ steps.lowercase.outputs.repository_owner }}/sedaro-nano-app:${{ github.sha }}

      - name: Show backend (app) image size
        run: |
          echo "Size of ghcr.io/${{ steps.lowercase.outputs.repository_owner }}/sedaro-nano-app:latest"
          docker images ghcr.io/${{ steps.lowercase.outputs.repository_owner }}/sedaro-nano-app:latest

      - name: Build and push frontend (web) image
        id: build_web
        uses: docker/build-push-action@v6
        with:
          context: ./web
          file: ./web/Dockerfile
          push: true
          load: true
          tags: |
            ghcr.io/${{ steps.lowercase.outputs.repository_owner }}/sedaro-nano-web:latest
            ghcr.io/${{ steps.lowercase.outputs.repository_owner }}/sedaro-nano-web:${{ steps.version.outputs.version }}
            ghcr.io/${{ steps.lowercase.outputs.repository_owner }}/sedaro-nano-web:${{ github.sha }}

      - name: Show frontend (web) image size
        run: |
          echo "Size of ghcr.io/${{ steps.lowercase.outputs.repository_owner }}/sedaro-nano-web:latest"
          docker images ghcr.io/${{ steps.lowercase.outputs.repository_owner }}/sedaro-nano-web:latest
