name: CI - Build and Push Docker Images

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'terraform/**'
      - '**/*.md'
      - '.github/workflows/terraform-deploy.yml'
      - '.github/workflows/terraform-destroy.yml'
      - '.github/workflows/deploy-k8s.yml'

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # Required for OIDC authentication with AWS
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Set up Node.js (for frontend build optimization)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Generate version number
        id: version
        run: |
          # Get the current run number and use it as patch version
          VERSION="0.0.${{ github.run_number }}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Generated version: $VERSION"

      - name: Build and push backend (app) image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./app/Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/sedaro-nano-demo-backend:${{ steps.version.outputs.version }}
            ${{ steps.login-ecr.outputs.registry }}/sedaro-nano-demo-backend:latest
            ${{ steps.login-ecr.outputs.registry }}/sedaro-nano-demo-backend:${{ github.sha }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Build and push frontend (web) image
        uses: docker/build-push-action@v6
        with:
          context: ./web
          file: ./web/Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/sedaro-nano-demo-frontend:${{ steps.version.outputs.version }}
            ${{ steps.login-ecr.outputs.registry }}/sedaro-nano-demo-frontend:latest
            ${{ steps.login-ecr.outputs.registry }}/sedaro-nano-demo-frontend:${{ github.sha }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: Cache Helm binary
        id: cache-helm
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/helm
          key: ${{ runner.os }}-helm-v3.13.3

      - name: Install Helm
        if: steps.cache-helm.outputs.cache-hit != 'true'
        run: |
          curl -fsSL -o get_helm.sh https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3
          chmod 700 get_helm.sh
          ./get_helm.sh

      - name: Package and Push Helm Chart to ECR
        id: helm
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          HELM_CHART_REPO_NAME: helm-charts # Or your chosen ECR repo name for charts
          CHART_PATH: ./helm/sedaro-nano
        run: |
          CHART_VERSION=$(helm show chart $CHART_PATH | grep '^version:' | awk '{print $2}')
          # Append run number to make it unique for each build, suitable for development/CI
          # For production releases, you might want a more controlled versioning strategy.
          FINAL_CHART_VERSION="$CHART_VERSION-${{ github.run_number }}"
          
          echo "Packaging Helm chart $CHART_PATH with version $FINAL_CHART_VERSION..."
          helm package $CHART_PATH --version $FINAL_CHART_VERSION -d ./helm_packaged
          
          CHART_PACKAGE_NAME="sedaro-nano-$FINAL_CHART_VERSION.tgz"
          OCI_URI="oci://$ECR_REGISTRY/$HELM_CHART_REPO_NAME"
          
          echo "Pushing Helm chart $CHART_PACKAGE_NAME to $OCI_URI..."
          helm push ./helm_packaged/$CHART_PACKAGE_NAME $OCI_URI
          
          echo "Helm chart pushed: $OCI_URI/sedaro-nano:$FINAL_CHART_VERSION"
          # Save the chart version for later use if needed by other jobs/workflows
          echo "chart_version=$FINAL_CHART_VERSION" >> $GITHUB_OUTPUT
          echo "chart_oci_uri=$OCI_URI/sedaro-nano" >> $GITHUB_OUTPUT # Base OCI URI for the chart

      - name: Show image and chart information
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          echo "Images pushed to ECR:"
          echo "Backend: $ECR_REGISTRY/sedaro-nano-demo-backend:${{ steps.version.outputs.version }}"
          echo "Frontend: $ECR_REGISTRY/sedaro-nano-demo-frontend:${{ steps.version.outputs.version }}"
          echo "Helm Chart Version: ${{ steps.helm.outputs.chart_version }}"
          echo "Helm Chart OCI URI: ${{ steps.helm.outputs.chart_oci_uri }}"
