name: Terraform Destroy Infrastructure

on:
  workflow_dispatch:
    inputs:
      confirm_destroy:
        description: 'Type "destroy" to confirm infrastructure destruction'
        required: true
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  confirm:
    name: Confirm Destruction
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm_destroy == 'destroy'
    
    steps:
      - name: Confirm destruction
        run: echo "Infrastructure destruction confirmed"

  destroy-workloads:
    name: Destroy Kubernetes Workloads
    runs-on: ubuntu-latest
    needs: confirm
    if: github.event.inputs.confirm_destroy == 'destroy'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Install and configure kubectl and Helm
        run: |
          # Install kubectl
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/
          
          # Install Helm
          curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
          
          # Configure kubectl
          aws eks update-kubeconfig --name ${{ vars.CLUSTER_NAME || 'sedaro-nano-demo' }} --region ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Uninstall Helm Release
        run: |
          # Check if release exists and uninstall
          if helm list --short | grep -q "^sedaro-nano$"; then
            echo "Uninstalling Helm release: sedaro-nano"
            helm uninstall sedaro-nano --wait
          else
            echo "Helm release 'sedaro-nano' not found, skipping"
          fi

      - name: Clean up ECR Images
        run: |
          # List and delete ECR repositories to save costs
          REPOSITORIES=$(aws ecr describe-repositories --query 'repositories[?starts_with(repositoryName, `sedaro-nano-demo`)].repositoryName' --output text 2>/dev/null || echo "")
          if [ ! -z "$REPOSITORIES" ]; then
            for repo in $REPOSITORIES; do
              echo "Cleaning up ECR repository: $repo"
              aws ecr list-images --repository-name $repo --query 'imageIds[*]' --output json | jq '.[] | select(.imageTag != null)' | \
              aws ecr batch-delete-image --repository-name $repo --image-ids file:///dev/stdin || true
            done
          else
            echo "No ECR repositories found to clean up"
          fi

  destroy-demo:
    name: Destroy Demo Environment
    runs-on: ubuntu-latest
    needs: destroy-workloads
    if: github.event.inputs.confirm_destroy == 'destroy'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.12.1

      - name: Terraform Init - Demo Environment
        working-directory: ./terraform/environments/demo
        run: terraform init

      - name: Terraform Refresh - Demo Environment
        working-directory: ./terraform/environments/demo
        env:
          TF_VAR_github_actions_role_arn: ${{ secrets.AWS_ROLE_ARN }}
          TF_VAR_admin_user_arn: ${{ secrets.ADMIN_USER_ARN || '' }}
        run: terraform refresh

      - name: Terraform Destroy - Demo Environment
        working-directory: ./terraform/environments/demo
        env:
          TF_VAR_github_actions_role_arn: ${{ secrets.AWS_ROLE_ARN }}
          TF_VAR_admin_user_arn: ${{ secrets.ADMIN_USER_ARN || '' }}
        run: terraform destroy -auto-approve
