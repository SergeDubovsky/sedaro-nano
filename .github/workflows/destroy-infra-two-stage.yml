name: Destroy Infrastructure (Two-Stage)

on:
  workflow_dispatch:  # Only allow manual triggering for destruction
    inputs:
      confirm_destroy:
        description: 'Type "destroy" to confirm infrastructure destruction'
        required: true
        type: string

permissions:
  id-token: write   # Required for OIDC
  contents: read    # Required to checkout code

jobs:
  confirm:
    name: Confirm Destruction
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm_destroy == 'destroy'
    
    steps:
      - name: Confirm destruction
        run: echo "Infrastructure destruction confirmed"

  destroy-workloads:
    name: Destroy Kubernetes Workloads
    runs-on: ubuntu-latest
    needs: confirm
    if: github.event.inputs.confirm_destroy == 'destroy'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Install and configure kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/
          aws eks update-kubeconfig --name ${{ vars.CLUSTER_NAME || 'sedaro-nano-demo' }} --region ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Delete Kubernetes Manifests
        run: |
          kubectl delete -f k8s/frontend-deployment.yaml --ignore-not-found=true
          kubectl delete -f k8s/backend-deployment.yaml --ignore-not-found=true
          kubectl delete -f k8s/backend-service.yaml --ignore-not-found=true

  destroy-addons:
    name: Destroy Add-ons (Stage 2)
    runs-on: ubuntu-latest
    needs: destroy-workloads
    if: github.event.inputs.confirm_destroy == 'destroy'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.12.1

      - name: Terraform Init - Add-ons
        working-directory: ./terraform-addons
        run: terraform init

      - name: Terraform Refresh - Add-ons
        working-directory: ./terraform-addons
        run: terraform refresh

      - name: Terraform Destroy - Add-ons
        working-directory: ./terraform-addons
        run: terraform destroy -auto-approve

  destroy-infrastructure:
    name: Destroy Infrastructure (Stage 1)
    runs-on: ubuntu-latest
    needs: destroy-addons
    if: github.event.inputs.confirm_destroy == 'destroy'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
      - name: Terraform Init - Infrastructure
        working-directory: ./terraform
        run: terraform init

      - name: Terraform Destroy - Infrastructure
        working-directory: ./terraform
        run: terraform destroy -auto-approve -var="github_actions_role_arn=${{ secrets.AWS_ROLE_ARN }}" -var="admin_user_arn=${{ secrets.ADMIN_USER_ARN }}"
