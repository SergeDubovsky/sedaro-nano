name: Terraform Deploy Infrastructure

on:
  push:
    branches: [ main ]
    paths:
      - 'terraform/environments/**'
      - 'terraform/modules/**'
      - '.github/workflows/terraform-deploy.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'terraform/environments/**'
      - 'terraform/modules/**'
      - '.github/workflows/terraform-deploy.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    name: Terraform Demo Environment
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Get full history for change detection

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Cache Terraform
        uses: actions/cache@v4
        with:
          path: |
            ~/.terraform.d/plugin-cache
            **/.terraform
            **/.terraform.lock.hcl
          key: terraform-${{ runner.os }}-${{ hashFiles('**/versions.tf', '**/main.tf') }}
          restore-keys: |
            terraform-${{ runner.os }}-

      - name: Configure Terraform Plugin Cache
        run: |
          mkdir -p ~/.terraform.d/plugin-cache
          echo 'plugin_cache_dir = "$HOME/.terraform.d/plugin-cache"' > ~/.terraformrc

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Terraform Format Check
        working-directory: ./terraform
        run: terraform fmt -check -recursive

      - name: Terraform Init (Local Validation)
        working-directory: ./terraform/environments/demo
        run: terraform init -backend=false

      - name: Terraform Init (Full)
        working-directory: ./terraform/environments/demo
        run: terraform init

      - name: Terraform Validate
        working-directory: ./terraform/environments/demo
        run: terraform validate

      - name: Terraform Plan
        working-directory: ./terraform/environments/demo
        env:
          TF_VAR_github_actions_role_arn: ${{ secrets.AWS_ROLE_ARN }}
          TF_VAR_admin_user_arn: ${{ secrets.ADMIN_USER_ARN || '' }}
        run: terraform plan -input=false -out=tfplan

      - name: Terraform Apply
        working-directory: ./terraform/environments/demo
        env:
          TF_VAR_github_actions_role_arn: ${{ secrets.AWS_ROLE_ARN }}
          TF_VAR_admin_user_arn: ${{ secrets.ADMIN_USER_ARN || '' }}
        run: terraform apply -auto-approve tfplan