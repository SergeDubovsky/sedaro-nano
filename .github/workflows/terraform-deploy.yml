name: Terraform Deploy Infrastructure

on:
  push:
    branches: [ main ]
    paths:
      - 'terraform/environments/**'
      - 'terraform/modules/**'
      - '.github/workflows/terraform-deploy.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'terraform/environments/**'
      - 'terraform/modules/**'
      - '.github/workflows/terraform-deploy.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  TF_VERSION: "1.12.1"

jobs:
  terraform:
    name: Terraform Demo Environment
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Get full history for change detection

      - name: Check for Terraform changes
        id: changes
        run: |
          if git diff --name-only HEAD~1 | grep -E '\.(tf|tfvars)$' > /dev/null; then
            echo "terraform=true" >> $GITHUB_OUTPUT
          else
            echo "terraform=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Terraform
        if: steps.changes.outputs.terraform == 'true'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Cache Terraform
        if: steps.changes.outputs.terraform == 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.terraform.d/plugin-cache
            **/.terraform
            **/.terraform.lock.hcl
          key: terraform-${{ runner.os }}-${{ hashFiles('**/versions.tf', '**/main.tf') }}
          restore-keys: |
            terraform-${{ runner.os }}-

      - name: Configure Terraform Plugin Cache
        if: steps.changes.outputs.terraform == 'true'
        run: |
          mkdir -p ~/.terraform.d/plugin-cache
          echo 'plugin_cache_dir = "$HOME/.terraform.d/plugin-cache"' > ~/.terraformrc

      - name: Configure AWS Credentials
        if: steps.changes.outputs.terraform == 'true' && (github.ref == 'refs/heads/main' || github.event_name == 'pull_request')
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Terraform Format Check
        if: steps.changes.outputs.terraform == 'true'
        working-directory: ./terraform
        run: terraform fmt -check -recursive

      - name: Terraform Init (Local Validation)
        if: steps.changes.outputs.terraform == 'true' && github.event_name != 'pull_request' && github.ref != 'refs/heads/main'
        working-directory: ./terraform/environments/demo
        run: terraform init -backend=false

      - name: Terraform Init (Full)
        if: steps.changes.outputs.terraform == 'true' && (github.ref == 'refs/heads/main' || github.event_name == 'pull_request')
        working-directory: ./terraform/environments/demo
        run: terraform init

      - name: Terraform Validate
        if: steps.changes.outputs.terraform == 'true'
        working-directory: ./terraform/environments/demo
        run: terraform validate

      - name: Terraform Plan
        if: steps.changes.outputs.terraform == 'true' && (github.ref == 'refs/heads/main' || github.event_name == 'pull_request')
        working-directory: ./terraform/environments/demo
        env:
          TF_VAR_github_actions_role_arn: ${{ secrets.AWS_ROLE_ARN }}
          TF_VAR_admin_user_arn: ${{ secrets.ADMIN_USER_ARN || '' }}
        run: terraform plan -input=false -out=tfplan

      - name: Terraform Apply
        if: steps.changes.outputs.terraform == 'true' && github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        working-directory: ./terraform/environments/demo
        env:
          TF_VAR_github_actions_role_arn: ${{ secrets.AWS_ROLE_ARN }}
          TF_VAR_admin_user_arn: ${{ secrets.ADMIN_USER_ARN || '' }}
        run: terraform apply -auto-approve tfplan

      - name: Comment PR
        if: steps.changes.outputs.terraform == 'true' && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Terraform plan completed successfully for demo environment.'
            })