name: "CodeQL Analysis"

on:
  push:
    branches: [ main ]
    paths:
      - 'app/**'
      - 'web/**'
      - 'queries/**'
      - '.github/workflows/codeql.yml'
    paths-ignore:
      - 'terraform/**'
      - 'k8s/**'
      - '**/*.md'
      - '**/*.txt'
      - '**/*.json'
      - '**/*.yml'
      - '**/*.yaml'
      - 'docker-compose.yml'
      - 'Dockerfile*'
  pull_request:
    branches: [ main ]
    paths:
      - 'app/**'
      - 'web/**'
      - 'queries/**'
      - '.github/workflows/codeql.yml'
    paths-ignore:
      - 'terraform/**'
      - 'k8s/**'
      - '**/*.md'
      - '**/*.txt'
      - '**/*.json'
      - '**/*.yml'
      - '**/*.yaml'
      - 'docker-compose.yml'
      - 'Dockerfile*'
  schedule:
    # Run weekly on Sundays at 2 AM UTC
    - cron: '0 2 * * 0'

jobs:
  analyze:
    name: Analyze Code
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        # Detect languages in your repository
        language: [ 'python', 'typescript', 'rust' ]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: ${{ matrix.language }}
        # Override the default queries with custom queries if needed
        # queries: security-extended,security-and-quality

    # Auto-detect and build code for compiled languages
    - name: Autobuild
      uses: github/codeql-action/autobuild@v3

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
      with:
        category: "/language:${{ matrix.language }}"
