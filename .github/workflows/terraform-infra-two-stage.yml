name: Terraform Infrastructure (Two-Stage)

on:
  push:
    branches: [ main ]
    paths:
      - 'environments/**'
      - 'modules/**'
      - '.github/workflows/terraform-infra-two-stage.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'environments/**'
      - 'modules/**'
      - '.github/workflows/terraform-infra-two-stage.yml'
  workflow_dispatch:  # Allow manual triggering

permissions:
  id-token: write   # Required for OIDC
  contents: read    # Required to checkout code

jobs:
  validate:
    name: Validate Terraform
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.12.1
          
      - name: Terraform Format Check - Demo Environment
        working-directory: ./environments/demo
        run: terraform fmt -check -recursive
      
      - name: Terraform Validate - Demo Environment
        working-directory: ./environments/demo
        run: |
          terraform init -backend=false
          terraform validate

      - name: Terraform Format Check - Modules
        working-directory: ./modules
        run: terraform fmt -check -recursive

  deploy-demo:
    name: Deploy Demo Environment
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.12.1

      - name: Terraform Init - Demo Environment
        working-directory: ./environments/demo
        run: terraform init

      - name: Terraform Plan - Demo Environment
        working-directory: ./environments/demo
        run: terraform plan -input=false -out=tfplan

      - name: Terraform Apply - Demo Environment
        working-directory: ./environments/demo
        run: terraform apply -auto-approve tfplan
