name: Terraform Infrastructure (Two-Stage)

on:
  push:
    branches: [ main ]
    paths:
      - 'terraform/**'
      - 'terraform-addons/**'
      - '.github/workflows/terraform-infra-two-stage.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'terraform/**'
      - 'terraform-addons/**'
      - '.github/workflows/terraform-infra-two-stage.yml'
  workflow_dispatch:  # Allow manual triggering

permissions:
  id-token: write   # Required for OIDC
  contents: read    # Required to checkout code

jobs:
  validate:
    name: Validate Terraform
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.12.1

      - name: Terraform Format Check - Infrastructure
        working-directory: ./terraform
        run: terraform fmt -check -recursive
      
      - name: Terraform Validate - Infrastructure
        working-directory: ./terraform
        run: |
          terraform init -backend=false
          terraform validate

      - name: Terraform Format Check - Add-ons
        working-directory: ./terraform-addons
        run: terraform fmt -check -recursive
      
      - name: Terraform Validate - Add-ons
        working-directory: ./terraform-addons
        run: |
          terraform init -backend=false
          terraform validate

  deploy-infrastructure:
    name: Deploy Infrastructure (Stage 1)
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.12.1

      - name: Terraform Init - Infrastructure
        working-directory: ./terraform
        run: terraform init

      - name: Terraform Plan - Infrastructure
        working-directory: ./terraform
        run: terraform plan -input=false -out=tfplan -var="github_actions_role_arn=${{ vars.AWS_ROLE_ARN }}"

      - name: Terraform Apply - Infrastructure
        working-directory: ./terraform
        run: terraform apply -auto-approve tfplan

  deploy-addons:
    name: Deploy Add-ons (Stage 2)
    runs-on: ubuntu-latest
    needs: deploy-infrastructure
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.12.1

      - name: Terraform Init - Add-ons
        working-directory: ./terraform-addons
        run: terraform init

      - name: Terraform Plan - Add-ons
        working-directory: ./terraform-addons
        run: terraform plan -input=false -out=tfplan

      - name: Terraform Apply - Add-ons
        working-directory: ./terraform-addons
        run: terraform apply -auto-approve tfplan
