name: Terraform Infrastructure (Two-Stage)

on:
  push:
    branches: [ main ]
    paths:
      - 'terraform/**'
      - 'terraform-addons/**'
      - 'k8s/**'
      - '.github/workflows/terraform-infra-two-stage.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'terraform/**'
      - 'terraform-addons/**'
      - 'k8s/**'
      - '.github/workflows/terraform-infra-two-stage.yml'
  workflow_dispatch:  # Allow manual triggering

permissions:
  id-token: write   # Required for OIDC
  contents: read    # Required to checkout code

jobs:
  validate:
    name: Validate Terraform
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.12.1

      - name: Terraform Format Check - Infrastructure
        working-directory: ./terraform
        run: terraform fmt -check -recursive
      
      - name: Terraform Validate - Infrastructure
        working-directory: ./terraform
        run: |
          terraform init -backend=false
          terraform validate

      - name: Terraform Format Check - Add-ons
        working-directory: ./terraform-addons
        run: terraform fmt -check -recursive
      
      - name: Terraform Validate - Add-ons
        working-directory: ./terraform-addons
        run: |
          terraform init -backend=false
          terraform validate

  deploy-infrastructure:
    name: Deploy Infrastructure (Stage 1)
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.12.1

      - name: Terraform Init - Infrastructure
        working-directory: ./terraform
        run: terraform init

      - name: Terraform Plan - Infrastructure
        working-directory: ./terraform
        run: terraform plan -input=false -out=tfplan -var="github_actions_role_arn=${{ vars.AWS_ROLE_ARN }}"

      - name: Terraform Apply - Infrastructure
        working-directory: ./terraform
        run: terraform apply -auto-approve -var="github_actions_role_arn=${{ vars.AWS_ROLE_ARN }}" tfplan
  deploy-addons:
    name: Deploy Add-ons (Stage 2)
    runs-on: ubuntu-latest
    needs: deploy-infrastructure
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.12.1

      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/      
      - name: Configure kubectl for EKS
        run: |
          # Verify AWS credentials are working
          echo "Testing AWS credentials..."
          aws sts get-caller-identity
          
          # Create AWS credentials file for kubectl compatibility
          mkdir -p ~/.aws
          cat > ~/.aws/credentials << EOF
          [default]
          aws_access_key_id = $AWS_ACCESS_KEY_ID
          aws_secret_access_key = $AWS_SECRET_ACCESS_KEY
          aws_session_token = $AWS_SESSION_TOKEN
          EOF
          
          cat > ~/.aws/config << EOF
          [default]
          region = ${{ vars.AWS_REGION || 'us-east-1' }}
          output = json
          EOF
          
          # Update kubeconfig
          echo "Updating kubeconfig..."
          aws eks update-kubeconfig --name ${{ vars.CLUSTER_NAME || 'sedaro-nano-demo' }} --region ${{ vars.AWS_REGION || 'us-east-1' }}
          
          # Test the token generation first
          echo "Testing token generation..."
          aws eks get-token --cluster-name ${{ vars.CLUSTER_NAME || 'sedaro-nano-demo' }} --region ${{ vars.AWS_REGION || 'us-east-1' }} --output json
          
          echo "Kubeconfig created successfully. Terraform will use ~/.kube/config"

      - name: Terraform Init - Add-ons
        working-directory: ./terraform-addons
        env:
          AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
          KUBE_CONFIG_PATH: ~/.kube/config
        run: terraform init

      - name: Terraform Plan - Add-ons
        working-directory: ./terraform-addons
        env:
          AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
          KUBE_CONFIG_PATH: ~/.kube/config
        run: terraform plan -input=false -out=tfplan

      - name: Terraform Apply - Add-ons
        working-directory: ./terraform-addons
        env:
          AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
          KUBE_CONFIG_PATH: ~/.kube/config
        run: terraform apply -auto-approve tfplan

  deploy-workloads:
    name: Deploy Kubernetes Workloads
    runs-on: ubuntu-latest
    needs: deploy-addons
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/

      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig --name ${{ vars.CLUSTER_NAME || 'sedaro-nano-demo' }} --region ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Deploy Kubernetes Manifests
        run: |
          kubectl apply -f k8s/backend-service.yaml
          kubectl apply -f k8s/backend-deployment.yaml
          kubectl apply -f k8s/frontend-deployment.yaml
