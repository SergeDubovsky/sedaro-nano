name: Deploy Kubernetes Workloads

on:
  workflow_run:
    workflows: ["CI - Build and Push Docker Images"]
    types:
      - completed
    branches: [ main ]
  workflow_dispatch:  # Allow manual triggering

permissions:
  id-token: write   # Required for OIDC
  contents: read    # Required to checkout code

jobs:
  deploy-workloads:
    name: Deploy Kubernetes Workloads
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/v1.30.0/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/kubectl

      - name: Install Helm
        run: |
          curl -fsSL -o get_helm.sh https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3
          chmod 700 get_helm.sh
          ./get_helm.sh

      - name: Configure kubectl for EKS
        run: |
          aws eks update-kubeconfig --name sedaro-nano-demo --region ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Deploy Helm Chart
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # Use the chart version that was pushed by the CI workflow
          CHART_BASE_VERSION=$(helm show chart ./helm/sedaro-nano | grep '^version:' | awk '{print $2}')
          CHART_VERSION="${CHART_BASE_VERSION}-${GITHUB_RUN_NUMBER}"
          
          echo "Deploying Helm chart: oci://${ECR_REGISTRY}/helm-charts/sedaro-nano:${CHART_VERSION}"
          echo "Using Docker image tag: ${IMAGE_TAG}"

          helm upgrade --install sedaro-nano oci://${ECR_REGISTRY}/helm-charts/sedaro-nano \
            --version ${CHART_VERSION} \
            --namespace default \
            --set image.backendRepository="${ECR_REGISTRY}/sedaro-nano-demo-backend" \
            --set image.frontendRepository="${ECR_REGISTRY}/sedaro-nano-demo-frontend" \
            --set image.tag="${IMAGE_TAG}" \
            --wait --timeout 5m0s # Wait for resources to be ready

      - name: Verify deployment status
        run: |
          echo "Verifying deployment status..."
          kubectl rollout status deployment/sedaro-nano-backend --timeout=60s
          kubectl rollout status deployment/sedaro-nano-frontend --timeout=60s
          kubectl get pods -l app.kubernetes.io/instance=sedaro-nano
          kubectl get services -l app.kubernetes.io/instance=sedaro-nano
          kubectl get ingress -l app.kubernetes.io/instance=sedaro-nano
          
      - name: Show deployment information
        run: |
          echo "Deployment completed successfully!"
          echo "Services:"
          kubectl get services -l app.kubernetes.io/instance=sedaro-nano
          echo "Pods:"
          kubectl get pods -l app.kubernetes.io/instance=sedaro-nano
          echo "Ingress:"
          kubectl get ingress -l app.kubernetes.io/instance=sedaro-nano
          echo "ALB Address (may take a few minutes to provision):"
          kubectl get ingress sedaro-nano -o jsonpath='{.status.loadBalancer.ingress[0].hostname}'
