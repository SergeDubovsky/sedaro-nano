name: Deploy Kubernetes Workloads

on:
  workflow_run:
    workflows: ["CI - Build and Push Docker Images"]
    types:
      - completed
    branches: [ main ]
  workflow_dispatch:
    inputs:
      chart_version:
        description: 'Specific chart version to deploy (e.g., 0.1.0-55). Leave empty to use latest.'
        required: false
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  deploy-workloads:
    name: Deploy Kubernetes Workloads
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/v1.31.1/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/kubectl

      - name: Install Helm
        run: |
          curl -fsSL -o get_helm.sh https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3
          chmod 700 get_helm.sh
          ./get_helm.sh

      - name: Configure kubectl for EKS
        run: |
          aws eks update-kubeconfig --name sedaro-nano-demo --region us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Deploy Helm Chart
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
          DOMAIN: ${{ vars.DOMAIN }}
          HOST: ${{ vars.HOST }}
        run: |
          CHART_BASE_VERSION=$(helm show chart ./helm/sedaro-nano | grep '^version:' | awk '{print $2}')
          
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            TRIGGERING_RUN_NUMBER="${{ github.event.workflow_run.run_number }}"
            CHART_VERSION="${CHART_BASE_VERSION}-${TRIGGERING_RUN_NUMBER}"
          elif [ -n "${{ inputs.chart_version }}" ]; then
            CHART_VERSION="${{ inputs.chart_version }}"
          else
            LATEST_TAG=$(aws ecr describe-images \
              --repository-name helm-charts/sedaro-nano \
              --region us-east-1 \
              --query "imageDetails[?starts_with(imageTags[0], '${CHART_BASE_VERSION}-')].imageTags[0]" \
              --output text | sort -V | tail -1)
            
            if [ -n "$LATEST_TAG" ] && [ "$LATEST_TAG" != "None" ]; then
              CHART_VERSION="$LATEST_TAG"
            else
              CHART_VERSION="${CHART_BASE_VERSION}-${GITHUB_RUN_NUMBER}"
            fi
          fi
          
          echo "Deploying chart version: ${CHART_VERSION}"
          
          # Base Helm command
          HELM_CMD="helm upgrade --install sedaro-nano oci://${ECR_REGISTRY}/helm-charts/sedaro-nano \
            --version ${CHART_VERSION} \
            --namespace sedaro-nano \
            --create-namespace \
            --set image.backendRepository=\"${ECR_REGISTRY}/sedaro-nano-demo-backend\" \
            --set image.frontendRepository=\"${ECR_REGISTRY}/sedaro-nano-demo-frontend\" \
            --set image.tag=\"${IMAGE_TAG}\""
          
          # Configure domain if both DOMAIN and HOST variables are set
          if [ -n "$DOMAIN" ] && [ -n "$HOST" ]; then
            FULL_DOMAIN="${HOST}.${DOMAIN}"
            echo "Configuring custom domain: ${FULL_DOMAIN}"
            
            # Enable domain configuration
            HELM_CMD="${HELM_CMD} \
              --set domain.enabled=true \
              --set domain.name=\"${DOMAIN}\" \
              --set domain.host=\"${HOST}\" \
              --set domain.fullName=\"${FULL_DOMAIN}\" \
              --set tls.enabled=true"
            
            # Try to find existing ACM certificate for the domain
            CERT_ARN=$(aws acm list-certificates \
              --region us-east-1 \
              --query "CertificateSummaryList[?DomainName=='${FULL_DOMAIN}' || contains(SubjectAlternativeNameSummary, '${FULL_DOMAIN}') || DomainName=='*.${DOMAIN}'].CertificateArn" \
              --output text | head -1)
            
            if [ -n "$CERT_ARN" ] && [ "$CERT_ARN" != "None" ]; then
              echo "Found ACM certificate: ${CERT_ARN}"
              HELM_CMD="${HELM_CMD} --set tls.certificate.arn=\"${CERT_ARN}\""
            else
              echo "No ACM certificate found for ${FULL_DOMAIN}"
              echo "Consider creating one manually or using cert-manager"
              # Disable TLS if no certificate is available
              HELM_CMD="${HELM_CMD} --set tls.enabled=false"
            fi
          else
            echo "Domain configuration disabled - DOMAIN and/or HOST variables not set"
            echo "Current values: DOMAIN='$DOMAIN', HOST='$HOST'"
          fi
          
          # Add common deployment flags
          HELM_CMD="${HELM_CMD} --wait --timeout 10m"
          
          # Execute the Helm command
          echo "Executing: ${HELM_CMD}"
          eval "${HELM_CMD}"

      - name: Verify deployment status
        run: |
          kubectl rollout status deployment/sedaro-nano-backend --timeout=300s -n sedaro-nano
          kubectl rollout status deployment/sedaro-nano-frontend --timeout=300s -n sedaro-nano
          kubectl get pods -n sedaro-nano
          kubectl get services -n sedaro-nano
          kubectl get ingress -n sedaro-nano
