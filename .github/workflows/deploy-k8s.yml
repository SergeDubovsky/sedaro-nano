name: Deploy Kubernetes Workloads

on:
  push:
    branches: [ main ]
    paths:
      - 'k8s/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'k8s/**'
  workflow_dispatch:  # Allow manual triggering

permissions:
  id-token: write   # Required for OIDC
  contents: read    # Required to checkout code

jobs:
  deploy-workloads:
    name: Deploy Kubernetes Workloads
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/v1.30.0/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/kubectl

      - name: Configure kubectl for EKS
        run: |
          aws eks update-kubeconfig --name ${{ vars.CLUSTER_NAME || 'sedaro-nano-demo' }} --region ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Prepare Kubernetes manifests with ECR URLs
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          # Replace ECR_REGISTRY placeholder in deployment files
          sed "s|\${ECR_REGISTRY}|$ECR_REGISTRY|g" k8s/backend-deployment.yaml > /tmp/backend-deployment.yaml
          sed "s|\${ECR_REGISTRY}|$ECR_REGISTRY|g" k8s/frontend-deployment.yaml > /tmp/frontend-deployment.yaml
          
          echo "Updated backend deployment:"
          cat /tmp/backend-deployment.yaml | grep image:
          echo "Updated frontend deployment:"
          cat /tmp/frontend-deployment.yaml | grep image:

      - name: Deploy Kubernetes manifests
        run: |
          kubectl apply -f k8s/backend-service.yaml
          kubectl apply -f /tmp/backend-deployment.yaml
          kubectl apply -f /tmp/frontend-deployment.yaml
          
      - name: Verify deployment status
        run: |
          kubectl rollout status deployment/sedaro-nano-backend --timeout=300s
          kubectl rollout status deployment/sedaro-nano-frontend --timeout=300s
          kubectl get pods -l app=sedaro-nano
          kubectl get services
          
      - name: Show deployment information
        run: |
          echo "Deployment completed successfully!"
          echo "Services:"
          kubectl get services
          echo "Pods:"
          kubectl get pods
