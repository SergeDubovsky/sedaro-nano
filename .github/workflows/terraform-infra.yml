name: Terraform Infrastructure

on:
  push:
    branches: [ main ]
    paths:
      - 'terraform/**'
      - 'k8s/**'
      - '.github/workflows/terraform-infra.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'terraform/**'
      - 'k8s/**'
      - '.github/workflows/terraform-infra.yml'
  workflow_dispatch:  # Allow manual triggering

permissions:
  id-token: write   # Required for OIDC
  contents: read    # Required to checkout code

jobs:
  validate:
    name: Validate Terraform
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.0

      - name: Terraform Format Check
        working-directory: ./terraform
        run: terraform fmt -check -recursive
      
      - name: Terraform Validate
        working-directory: ./terraform
        run: |
          terraform init -backend=false
          terraform validate

  deploy:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Debug OIDC token
        shell: bash
        run: |
            # build the URL correctly (use “?” if there isn’t already a query string)
            TOKEN_URL="${ACTIONS_ID_TOKEN_REQUEST_URL}?audience=sts.amazonaws.com"
            echo "Requesting token from $TOKEN_URL"
            # include the Bearer prefix and real env var
            ID_TOKEN=$(curl -sH "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "$TOKEN_URL")
            echo "Raw token: $ID_TOKEN"
            echo "Decoded claims:"
            echo "$ID_TOKEN" \
            | cut -d. -f2 \
            | base64 -d \
            | jq '{aud,sub}'
      - name: Dump the role ARN
        run: echo "ARN → ${{ vars.AWS_ROLE_ARN }}"
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.0

      - name: Terraform Init
        working-directory: ./terraform
        run: terraform init

      - name: Terraform Plan
        working-directory: ./terraform
        run: terraform plan -input=false -out=tfplan

      - name: Terraform Apply
        working-directory: ./terraform
        run: terraform apply -auto-approve tfplan

      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig --name ${{ vars.CLUSTER_NAME || 'sedaro-nano-cluster' }} --region ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Deploy Kubernetes Manifests
        run: |
          kubectl apply -f k8s/backend-service.yaml
          kubectl apply -f k8s/backend-deployment.yaml
          kubectl apply -f k8s/frontend-deployment.yaml
