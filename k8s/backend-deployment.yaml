apiVersion: apps/v1
kind: Deployment
metadata:
  name: sedaro-nano-backend
  labels:
    app: sedaro-nano
    tier: backend
    env: demo # Added demo label
spec:
  # For production, consider increasing replicas for high availability (e.g., 2 or 3)
  replicas: 1
  strategy: # Added for clarity, RollingUpdate is default
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 25%
      maxSurge: 25%
  selector:
    matchLabels:
      app: sedaro-nano
      tier: backend
  template:
    metadata:
      labels:
        app: sedaro-nano
        tier: backend
        env: demo # Added demo label
    spec:      containers:
      - name: sedaro-nano-app
        image: "${ECR_REGISTRY}/sedaro-nano-demo-backend:latest"
        imagePullPolicy: Always # Added imagePullPolicy
        ports:
        - containerPort: 8000
        resources: # Added resource requests and limits
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
