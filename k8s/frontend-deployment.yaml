apiVersion: apps/v1
kind: Deployment
metadata:
  name: sedaro-nano-frontend
  labels:
    app: sedaro-nano
    tier: frontend
    env: demo # Added demo label
spec:
  # For production, consider increasing replicas for high availability (e.g., 2 or 3)
  replicas: 1
  strategy: # Added for clarity, RollingUpdate is default
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 25%
      maxSurge: 25%
  selector:
    matchLabels:
      app: sedaro-nano
      tier: frontend
  template:
    metadata:
      labels:
        app: sedaro-nano
        tier: frontend
        env: demo # Added demo label
    spec:      containers:
      - name: sedaro-nano-web
        image: "${ECR_REGISTRY}/sedaro-nano-demo-frontend:latest"
        imagePullPolicy: Always # Added imagePullPolicy
        ports:
        - containerPort: 80
        resources: # Added resource requests and limits
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "250m"
            memory: "128Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
