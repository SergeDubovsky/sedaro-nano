server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html index.htm;

    # Send all non-asset requests to index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Optional: Add specific caching rules for assets if needed
    # Example for caching static assets for a long time
    # location ~* \.(?:css|js|jpg|jpeg|gif|png|ico|svg|woff|woff2)$ {
    #   expires 1y;
    #   add_header Cache-Control "public";
    #   access_log off;
    # }
}
